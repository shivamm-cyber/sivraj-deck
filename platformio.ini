; ─────────────────────────────────────────────────────────────
; SIVRAJ DECK — ESP32 Cybersecurity Field Unit
; Full Marauder-equivalent firmware
; MQTT relay to sivraj.in
; ─────────────────────────────────────────────────────────────

[env:esp32]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = min_spiffs.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    https://github.com/ivanseidel/LinkedList.git
    SPI
    SD
    FS
    WiFi
    Update

; ── Build Flags ──────────────────────────────────────────────
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_PARALLEL_8_BIT=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; ── Parallel data pins (VERIFIED WORKING) ──────
    -DTFT_D0=19
    -DTFT_D1=23
    -DTFT_D2=26
    -DTFT_D3=25
    -DTFT_D4=17
    -DTFT_D5=16
    -DTFT_D6=27
    -DTFT_D7=14
    ; ── Control pins ────────────────────────────
    -DTFT_CS=33
    -DTFT_DC=21
    -DTFT_RST=32
    -DTFT_WR=4
    -DTFT_RD=22
    ; ── Library options ────────────────────────────
    -DDISABLE_ALL_LIBRARY_WARNINGS=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    ; ── Feature flags ────────────────────────────
    -DHAS_SCREEN=1
    -DHAS_BUTTONS=1
    -DHAS_SD=1
    -DHAS_BT=1
    -DHAS_BATTERY=1
    -DHAS_MQTT=1
    ; ── ESP-IDF config ────────────────────────────
    -DCONFIG_ESP32_WIFI_STATIC_TX_BUFFER_NUM=16
    -DCONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=32
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_USB_MODE=0
